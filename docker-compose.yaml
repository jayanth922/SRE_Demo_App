version: "3.8"

# =============================================================================
# SRE Demo App — Simulated client infrastructure
#
# Runs 3 microservices + full observability stack.
# Alertmanager fires webhooks to the SaaS platform when alerts trigger.
#
# Usage:
#   cp .env.example .env          # fill in SAAS_WEBHOOK_URL + CLUSTER_TOKEN
#   docker compose up -d --build
#   open http://localhost:3000    # Grafana
#   open http://localhost:9090    # Prometheus
# =============================================================================

services:

  # ── Application Services ────────────────────────────────────────────────────

  api-gateway:
    build:
      context: ./services/api-gateway
    container_name: api-gateway
    ports:
      - "8000:8000"
    environment:
      - CHECKOUT_SERVICE_URL=http://checkout-service:8001
      - INVENTORY_SERVICE_URL=http://inventory-service:8002
    depends_on:
      - checkout-service
      - inventory-service
    networks:
      - demo-net
    labels:
      com.docker.compose.project: sre-demo-app
    restart: unless-stopped

  checkout-service:
    build:
      context: ./services/checkout-service
    container_name: checkout-service
    ports:
      - "8001:8001"
    environment:
      - ERROR_RATE=${CHECKOUT_ERROR_RATE:-0.15}
      - SLOW_RATE=${CHECKOUT_SLOW_RATE:-0.20}
      - CHAOS_MODE=${CHAOS_MODE:-false}
    networks:
      - demo-net
    labels:
      com.docker.compose.project: sre-demo-app
    restart: unless-stopped

  inventory-service:
    build:
      context: ./services/inventory-service
    container_name: inventory-service
    ports:
      - "8002:8002"
    environment:
      - SLOW_QUERY_RATE=${INVENTORY_SLOW_QUERY_RATE:-0.25}
    networks:
      - demo-net
    labels:
      com.docker.compose.project: sre-demo-app
    restart: unless-stopped

  load-generator:
    build:
      context: ./load-generator
    container_name: load-generator
    environment:
      - GATEWAY_URL=http://api-gateway:8000
      - RPS=${LOAD_RPS:-5}
      - BURST_RPS=${LOAD_BURST_RPS:-20}
      - BURST_DURATION=${LOAD_BURST_DURATION:-15}
      - BURST_INTERVAL=${LOAD_BURST_INTERVAL:-60}
    depends_on:
      - api-gateway
    networks:
      - demo-net
    labels:
      com.docker.compose.project: sre-demo-app
    restart: unless-stopped

  # ── Observability Stack ─────────────────────────────────────────────────────

  prometheus:
    image: prom/prometheus:v2.51.2
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    networks:
      - demo-net
    restart: unless-stopped

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: alertmanager
    ports:
      - "9093:9093"
    volumes:
      - ./monitoring/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    environment:
      - SAAS_WEBHOOK_URL=${SAAS_WEBHOOK_URL}
      - CLUSTER_TOKEN=${CLUSTER_TOKEN}
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
    networks:
      - demo-net
    restart: unless-stopped

  loki:
    image: grafana/loki:2.9.7
    container_name: loki
    ports:
      - "3100:3100"
    volumes:
      - ./monitoring/loki/loki.yml:/etc/loki/local-config.yaml:ro
      - loki-data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - demo-net
    restart: unless-stopped

  promtail:
    image: grafana/promtail:2.9.7
    container_name: promtail
    volumes:
      - ./monitoring/promtail/promtail.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki
    networks:
      - demo-net
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.4.2
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_AUTH_ANONYMOUS_ENABLED=true
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
      - loki
    networks:
      - demo-net
    restart: unless-stopped

networks:
  demo-net:
    driver: bridge
    name: sre-demo-net

volumes:
  prometheus-data:
  loki-data:
  grafana-data:
