server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # Scrape logs from all demo service containers
  - job_name: docker-containers
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      # Only scrape containers in this compose project
      - source_labels: [__meta_docker_container_label_com_docker_compose_project]
        regex: sre-demo-app
        action: keep
      # Use container name as service label
      - source_labels: [__meta_docker_container_name]
        regex: /(.*)
        target_label: service
        replacement: $1
      # Add log stream label
      - source_labels: [__meta_docker_container_log_stream]
        target_label: stream
    pipeline_stages:
      # Parse JSON log lines emitted by our services
      - json:
          expressions:
            level:     level
            service:   service
            message:   message
            timestamp: timestamp
      - labels:
          level:
          service:
      - timestamp:
          source: timestamp
          format: "2006-01-02T15:04:05"
