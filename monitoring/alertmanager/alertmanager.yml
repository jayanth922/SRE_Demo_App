global:
  resolve_timeout: 5m

route:
  group_by: ["alertname", "service"]
  group_wait:      10s
  group_interval:  30s
  repeat_interval: 10m
  receiver: sre-platform-webhook

  routes:
    - match:
        severity: critical
      receiver: sre-platform-webhook
      group_wait: 5s          # fire critical alerts faster
      repeat_interval: 5m

    - match:
        severity: warning
      receiver: sre-platform-webhook
      repeat_interval: 15m

receivers:
  - name: sre-platform-webhook
    webhook_configs:
      - url: "${SAAS_WEBHOOK_URL}"   # e.g. https://sre-platform.example.com/api/v1/alerts/webhook
        send_resolved: true
        http_config:
          bearer_token: "${CLUSTER_TOKEN}"
        max_alerts: 10
